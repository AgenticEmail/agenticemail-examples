name: smoke

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install agenticemail anthropic
      - name: Run smoke test
        env:
          AGENTICEMAIL_API_KEY: ${{ secrets.AGENTICEMAIL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INBOX_DOMAIN: ${{ secrets.INBOX_DOMAIN }}
        run: python scripts/smoke_test.py
